<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>MMX - Physique Solide</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: sans-serif; }
        #overlay { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #111; z-index: 1000; color: white; }
        #loader-bar { width: 0%; height: 5px; background: #ff4757; position: absolute; bottom: 0; left: 0; transition: width 0.3s; }
        #btn-play { padding: 15px 40px; font-size: 18px; cursor: pointer; display: none; background: #ff4757; color: white; border: none; border-radius: 4px; font-weight: bold; }
        #crosshair { position: absolute; top: 50%; left: 50%; width: 6px; height: 6px; background: white; border-radius: 50%; transform: translate(-50%, -50%); pointer-events: none; z-index: 10; border: 1px solid black; }
        #hud { position: absolute; bottom: 20px; left: 20px; color: white; text-shadow: 2px 2px 4px #000; pointer-events: none; font-size: 12px; opacity: 0.7; }
    </style>
</head>
<body>

    <div id="overlay">
        <h1>MURDER MYSTERY X</h1>
        <div style="width: 200px; height: 4px; background: #333; margin: 20px;"><div id="loader-bar"></div></div>
        <p id="status">Chargement de la structure...</p>
        <button id="btn-play">JOUER</button>
    </div>

    <div id="crosshair"></div>
    <div id="hud"><b>Z,Q,S,D</b> : Bouger | <b>MAJ</b> : Courir | <b>F</b> : Lampe | <b>E</b> : Couteau</div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>

    <script>
        let scene, camera, renderer, mapModel, flashlight, knife;
        let isKnifeActive = false, isFlashlightOn = true;
        const keys = {}, groundLevel = -12;
        
        // --- REGLAGES PERSONNAGE PLUS PETIT ---
        const playerHeight = 1.6; // Taille réduite (yeux à 1.6m)
        const playerRadius = 0.8; // Rayon de collision autour du joueur
        
        let velocityY = 0, canJump = false;
        const raycaster = new THREE.Raycaster();

        // 1. CHARGEMENT
        const loader = new THREE.GLTFLoader();
        loader.load('./maison.glb', (gltf) => {
            mapModel = gltf.scene;
            mapModel.traverse(n => { if(n.isMesh) { n.material.side = 2; n.castShadow = true; n.receiveShadow = true; }});
            
            const box = new THREE.Box3().setFromObject(mapModel);
            const size = box.getSize(new THREE.Vector3());
            const scale = 110 / Math.max(size.x, size.z);
            mapModel.scale.set(scale, scale, scale);
            const center = box.getCenter(new THREE.Vector3());
            mapModel.position.set(-center.x * scale, groundLevel, -center.z * scale);

            document.getElementById('status').innerText = "✅ Maison Solide Prête";
            document.getElementById('btn-play').style.display = "block";
        }, (xhr) => {
            document.getElementById('loader-bar').style.width = (xhr.loaded / xhr.total * 100) + "%";
        });

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x020202);
            scene.fog = new THREE.FogExp2(0x020202, 0.015);

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.rotation.order = 'YXZ';
            camera.position.set(0, groundLevel + playerHeight, 35); 

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.outputEncoding = THREE.sRGBEncoding;
            document.body.appendChild(renderer.domElement);

            scene.add(new THREE.AmbientLight(0xffffff, 0.2));
            flashlight = new THREE.SpotLight(0xffffff, 4, 50, Math.PI/6, 0.5);
            scene.add(flashlight); scene.add(flashlight.target);

            // COUTEAU
            knife = new THREE.Group();
            const blade = new THREE.Mesh(new THREE.BoxGeometry(0.02, 0.4, 0.08), new THREE.MeshStandardMaterial({color: 0x888888, metalness: 1}));
            const handle = new THREE.Mesh(new THREE.BoxGeometry(0.04, 0.15, 0.04), new THREE.MeshStandardMaterial({color: 0x331100}));
            blade.position.y = 0.25; knife.add(blade); knife.add(handle);
            knife.visible = false; scene.add(knife);

            if(mapModel) scene.add(mapModel);
            animate();
        }

        // FONCTION DE COLLISION AVANCÉE
        function checkCollision(targetPos, currentPos) {
            if (!mapModel) return targetPos;

            // On teste 4 directions horizontales + 1 verticale (toit)
            const dirs = [
                new THREE.Vector3(0, 0, -1), // Devant
                new THREE.Vector3(0, 0, 1),  // Derrière
                new THREE.Vector3(1, 0, 0),  // Droite
                new THREE.Vector3(-1, 0, 0), // Gauche
                new THREE.Vector3(0, 1, 0)   // Haut (Toit)
            ];

            for (let d of dirs) {
                // On transforme la direction selon la rotation du joueur pour le horizontal
                let worldDir = d.clone().applyQuaternion(camera.quaternion);
                if (d.y !== 0) worldDir = d; // Garder le vecteur haut vertical pur

                raycaster.set(currentPos, worldDir);
                const hits = raycaster.intersectObject(mapModel, true);

                if (hits.length > 0 && hits[0].distance < playerRadius) {
                    return currentPos; // Si on touche, on bloque le mouvement
                }
            }
            return targetPos;
        }

        window.addEventListener('keydown', (e) => {
            keys[e.code] = true;
            if(e.code === 'KeyF') { isFlashlightOn = !isFlashlightOn; flashlight.visible = isFlashlightOn; }
            if(e.code === 'KeyE') { isKnifeActive = !isKnifeActive; knife.visible = isKnifeActive; }
            if(e.code === 'Space' && canJump) { velocityY = 0.2; canJump = false; }
        });
        window.addEventListener('keyup', (e) => keys[e.code] = false);

        document.addEventListener('mousemove', (e) => {
            if (document.pointerLockElement) {
                camera.rotation.y -= e.movementX * 0.002;
                camera.rotation.x -= e.movementY * 0.002;
                camera.rotation.x = Math.max(-1.5, Math.min(1.5, camera.rotation.x));
                camera.rotation.z = 0;
            }
        });

        function animate() {
            requestAnimationFrame(animate);
            if (document.pointerLockElement) {
                const speed = keys['ShiftLeft'] ? 0.3 : 0.15;
                let oldPos = camera.position.clone();
                
                // Mouvement temporaire
                if (keys['KeyW']) camera.translateZ(-speed);
                if (keys['KeyS']) camera.translateZ(speed);
                if (keys['KeyA']) camera.translateX(-speed);
                if (keys['KeyD']) camera.translateX(speed);

                // Application de la collision
                let newPos = camera.position.clone();
                camera.position.copy(oldPos); // Reset
                camera.position.copy(checkCollision(newPos, oldPos)); // Valide ou bloque

                // Gravité et Toit
                velocityY -= 0.01;
                camera.position.y += velocityY;

                // Test collision plafond (toit)
                raycaster.set(camera.position, new THREE.Vector3(0, 1, 0));
                const roofHit = raycaster.intersectObject(mapModel, true);
                if (roofHit.length > 0 && roofHit[0].distance < 0.5) {
                    velocityY = -0.01; // On rebondit vers le bas
                }

                if (camera.position.y <= groundLevel + playerHeight) {
                    camera.position.y = groundLevel + playerHeight;
                    velocityY = 0; canJump = true;
                }

                // Update Objets
                flashlight.position.copy(camera.position);
                const targetPos = new THREE.Vector3(0, 0, -1).applyQuaternion(camera.quaternion).add(camera.position);
                flashlight.target.position.copy(targetPos);

                if(isKnifeActive) {
                    knife.position.copy(camera.position);
                    knife.quaternion.copy(camera.quaternion);
                    knife.translateX(0.5); knife.translateY(-0.4); knife.translateZ(-0.8);
                    knife.rotation.x += 1.2;
                }
            }
            renderer.render(scene, camera);
        }

        document.getElementById('btn-play').addEventListener('click', () => {
            document.body.requestPointerLock();
            document.getElementById('overlay').style.display = 'none';
            init();
        });

        window.addEventListener('resize', () => {
            if(!camera) return;
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
