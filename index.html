<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MURDER MYSTERY X - FIX FINAL</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Segoe UI', sans-serif; }
        #hud { position: absolute; top: 20px; left: 20px; z-index: 10; color: #00d4ff; font-size: 1.8em; font-weight: bold; text-shadow: 2px 2px 0px #000; pointer-events: none; visibility: hidden; }
        #crosshair { position: absolute; top: 50%; left: 50%; width: 12px; height: 12px; border: 2px solid white; border-radius: 50%; transform: translate(-50%, -50%); z-index: 5; pointer-events: none; display: none; }
        
        #instructions { 
            position: absolute; inset: 0; display: flex; flex-direction: column; 
            align-items: center; justify-content: center; background: #050505; color: white; z-index: 100; 
        }
        #menu-box { background: #111; padding: 40px; border: 3px solid #00d4ff; border-radius: 15px; text-align: center; }
        
        input { padding: 15px; margin: 20px 0; font-size: 1.2em; border: 2px solid #00d4ff; background: #000; color: #fff; text-align: center; width: 220px; }
        button { padding: 15px 50px; font-size: 1.3em; cursor: pointer; background: #00d4ff; border: none; font-weight: bold; color: #000; border-radius: 5px; }
        button:active { transform: scale(0.95); }
    </style>
</head>

    <div id="crosshair"></div>

            <br>

        // --- 1. GESTION DU BOUTON (ACTION IMMÉDIATE) ---
        const joinBtn = document.getElementById('joinBtn');
        
        joinBtn.onclick = function() {
            const nick = document.getElementById('nickname').value.trim();
            if (nick === "") return alert("Choisis un pseudo !");

            console.log("Démarrage du jeu...");
            
            // Masquer le menu immédiatement
            document.getElementById('instructions').style.display = 'none';
            document.getElementById('crosshair').style.display = 'block';
            document.getElementById('hud').style.visibility = 'visible';
            
            // Tenter de verrouiller la souris
            document.body.requestPointerLock();

            // Connexion Socket.io
            try {
                socket = io("https://murder-mystery-x.onrender.com");
                setupSocketHandlers();
                socket.emit('joinGame', nick);
            } catch(e) { console.error("Erreur serveur:", e); }

            // Lancer la 3D
            isReady = true;
            initGame();
        };
