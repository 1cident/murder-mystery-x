        body { margin: 0; overflow: hidden; background: #000; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }

            color: #00d4ff; font-size: 1.8em; font-weight: bold;

            border: 3px solid #00d4ff; border-radius: 20px;

        }

        button {

            background: #00d4ff; border: none; font-weight: bold; 
            color: #000; border-radius: 5px; transition: 0.3s;
        }

        button:hover { background: #fff; transform: scale(1.1); box-shadow: 0 0 20px #fff; }

        #status-msg { margin-top: 15px; color: #666; font-style: italic; }
    </style>
</head>
