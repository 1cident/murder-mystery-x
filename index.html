<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>MMX - Sol rabaissé</title>
    <style>
        body { margin: 0; overflow: hidden; background: #00BFFF; font-family: sans-serif; }
        #overlay { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #00BFFF; z-index: 1000; }
        #status { color: white; font-weight: bold; font-size: 20px; text-shadow: 2px 2px black; }
        #btn-play { padding: 15px 40px; font-size: 24px; cursor: pointer; display: none; margin-top: 20px; background: #ff4757; color: white; border: none; border-radius: 10px; }
    </style>
</head>
<body>

    <div id="overlay">
        <div id="status">Chargement...</div>
        <button id="btn-play">JOUER</button>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>

    <script>
        let scene, camera, renderer, mapModel;
        const keys = {};
        
        let velocityY = 0;
        const gravity = -0.012;
        const jumpStrength = 0.25;
        
        // --- RÉGLAGES DU SOL ---
        const groundLevel = -5; // On descend le sol à -5
        const playerHeight = groundLevel + 2; // Le joueur sera 2 unités au-dessus du sol
        let canJump = false;

        const loader = new THREE.GLTFLoader();
        loader.load('./maison.glb', (gltf) => {
            mapModel = gltf.scene;
            const box = new THREE.Box3().setFromObject(mapModel);
            const size = box.getSize(new THREE.Vector3());
            const scale = 60 / Math.max(size.x, size.z); 
            mapModel.scale.set(scale, scale, scale);
            
            // On pose la maison sur le nouveau niveau du sol
            const center = box.getCenter(new THREE.Vector3());
            mapModel.position.set(-center.x * scale, groundLevel, -center.z * scale);

            document.getElementById('status').innerText = "✅ Carte prête !";
            document.getElementById('btn-play').style.display = "block";
        });

        document.getElementById('btn-play').addEventListener('click', () => {
            document.body.requestPointerLock();
            document.getElementById('overlay').style.display = 'none';
            init();
        });

            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x00BFFF);
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);

            camera.position.set(0, groundLevel + 5, 10);

            document.body.appendChild(renderer.domElement);
