<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Murder Mystery X</title>
    <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Special+Elite&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; background: #0f0f0f; color: #d4af37; font-family: 'Special Elite', cursive; overflow: hidden; display: flex; justify-content: center; align-items: center; height: 100vh; }
        #game-ui { position: absolute; border: 3px solid #d4af37; padding: 40px; background: rgba(20, 20, 20, 0.95); text-align: center; width: 350px; z-index: 10; }
        button { display: block; width: 100%; padding: 10px; margin: 10px 0; background: transparent; border: 2px solid #d4af37; color: #d4af37; cursor: pointer; font-family: 'Special Elite'; font-weight: bold; }
        canvas { display: none; background: #050505; }
    </style>
</head>
<body>

<div id="game-ui">
    <div id="menu">
        <h1>MURDER MYSTERY X</h1>
        <button onclick="startGame()">REJOINDRE LA PARTIE</button>
    </div>
</div>

<canvas id="gameCanvas"></canvas>

<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>

<script>
    // REMPLACE BIEN PAR TON URL RENDER CI-DESSOUS
    const socket = io("https://murder-mystery-x.onrender.com");
    
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    let gameRunning = false;
    let players = {}; 
    const myPlayer = { x: 400, y: 300, size: 20, speed: 5, color: '#d4af37' };
    const keys = {};

    socket.on('currentPlayers', (serverPlayers) => { players = serverPlayers; });
    socket.on('newPlayer', (playerInfo) => { players[playerInfo.id] = playerInfo; });
    socket.on('playerMoved', (p) => { players[p.id] = p; });
    socket.on('playerDisconnected', (id) => { delete players[id]; });

    function startGame() {
        document.getElementById('game-ui').style.display = 'none';
        canvas.style.display = 'block';
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        gameRunning = true;
        gameLoop();
    }

    window.addEventListener('keydown', e => keys[e.key.toLowerCase()] = true);
    window.addEventListener('keyup', e => keys[e.key.toLowerCase()] = false);

    function update() {
        let moved = false;
        if (keys['z'] || keys['arrowup']) { myPlayer.y -= myPlayer.speed; moved = true; }
        if (keys['s'] || keys['arrowdown']) { myPlayer.y += myPlayer.speed; moved = true; }
        if (keys['q'] || keys['arrowleft']) { myPlayer.x -= myPlayer.speed; moved = true; }
        if (keys['d'] || keys['arrowright']) { myPlayer.x += myPlayer.speed; moved = true; }

        if (moved) {
            socket.emit('playerMovement', { x: myPlayer.x, y: myPlayer.y });
        }
    }

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        // Autres joueurs
        Object.keys(players).forEach((id) => {
            if (id !== socket.id) {
                ctx.fillStyle = players[id].color;
                ctx.fillRect(players[id].x - 10, players[id].y - 10, 20, 20);
            }
        });

        // Mon joueur
        ctx.fillStyle = myPlayer.color;
        ctx.fillRect(myPlayer.x - 10, myPlayer.y - 10, 20, 20);
    }

    function gameLoop() {
        if (!gameRunning) return;
        update();
        draw();
        requestAnimationFrame(gameLoop);
    }
</script>
</body>
</html>
