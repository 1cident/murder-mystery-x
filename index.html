<script>
    let scene, camera, renderer, mapModel, flashlight;
    const keys = {};
    let velocityY = 0;
    let canJump = false;

    const groundLevel = -12;
    const playerHeight = 2.2;

    const loader = new THREE.GLTFLoader();
    loader.load('./maison.glb', (gltf) => {
        mapModel = gltf.scene;
        mapModel.rotation.set(0, 0, 0);
        const box = new THREE.Box3().setFromObject(mapModel);
        const size = box.getSize(new THREE.Vector3());
        const scale = 110 / Math.max(size.x, size.z);
        mapModel.scale.set(scale, scale, scale);
        const center = box.getCenter(new THREE.Vector3());
        mapModel.position.set(-center.x * scale, -12, -center.z * scale);

        document.getElementById('status').innerText = "✅ Maison prête";
        document.getElementById('btn-play').style.display = "block";
    });

    // --- LE BOUTON JOUER (CORRIGÉ) ---
    document.getElementById('btn-play').addEventListener('click', () => {
        document.body.requestPointerLock();
        document.getElementById('overlay').style.display = 'none';
        init(); 
    });

    function init() {
        scene = new THREE.Scene();
        scene.background = new THREE.Color(0x020202);
        
        camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.rotation.order = 'YXZ'; 
        camera.position.set(0, groundLevel + playerHeight, 30); 

        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.outputEncoding = THREE.sRGBEncoding;
        document.body.appendChild(renderer.domElement);

        flashlight = new THREE.SpotLight(0xffffff, 4, 50, Math.PI/6, 0.5);
        scene.add(flashlight);
        scene.add(flashlight.target);

        scene.add(new THREE.AmbientLight(0xffffff, 0.2));
        if(mapModel) scene.add(mapModel);
        animate();
    }
            
    window.addEventListener('keydown', (e) => {
        keys[e.code] = true;
        if(e.code === 'KeyF' && flashlight) flashlight.visible = !flashlight.visible;
        if(e.code === 'Space' && canJump) { velocityY = 0.2; canJump = false; }
    });
    window.addEventListener('keyup', (e) => keys[e.code] = false);

    document.addEventListener('mousemove', (e) => {
        if (document.pointerLockElement) {
            camera.rotation.y -= e.movementX * 0.002;
            camera.rotation.x -= e.movementY * 0.002;
            camera.rotation.x = Math.max(-1.5, Math.min(1.5, camera.rotation.x));
            camera.rotation.z = 0;
        }
    });

    function animate() {
        requestAnimationFrame(animate);
        if (document.pointerLockElement) {
            const speed = keys['ShiftLeft'] ? 0.35 : 0.18;
            
            if (keys['KeyW']) camera.translateZ(-speed);
            if (keys['KeyS']) camera.translateZ(speed);
            if (keys['KeyA']) camera.translateX(-speed);
            if (keys['KeyD']) camera.translateX(speed);

            if (camera.position.y > -9.8) {
                velocityY -= 0.01;
                canJump = false;
            } else {
                velocityY = 0;
                camera.position.y = -9.8;
                canJump = true; // --- RÉACTIVE LE SAUT ---
            }
            camera.position.y += velocityY;

            if (flashlight) {
                flashlight.position.copy(camera.position);
                const vector = new THREE.Vector3(0, 0, -1).applyQuaternion(camera.quaternion);
                flashlight.target.position.copy(camera.position).add(vector);
            }
        }
        renderer.render(scene, camera);
    }
</script>
