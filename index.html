<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>MMX - QUARTIER DÉTAILLÉ</title>
    <style>
        body { margin: 0; overflow: hidden; background: #87CEEB; font-family: 'Segoe UI', sans-serif; }
        #hud { position: absolute; top: 20px; left: 20px; color: #111; font-size: 22px; font-weight: bold; background: rgba(255,255,255,0.8); padding: 12px; border: 2px solid #333; border-radius: 8px; z-index: 10; pointer-events: none; }
        #crosshair { position: absolute; top: 50%; left: 50%; width: 14px; height: 14px; border: 2px solid #000; border-radius: 50%; transform: translate(-50%, -50%); z-index: 5; pointer-events: none; }
        #overlay { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; background: #87CEEB; z-index: 100; cursor: pointer; }
        #btn-play { padding: 25px 50px; font-size: 28px; font-weight: bold; color: white; background: #2ecc71; border: none; border-radius: 50px; cursor: pointer; box-shadow: 0 8px 0 #27ae60; }
        #btn-play:active { transform: translateY(4px); box-shadow: 0 4px 0 #27ae60; }
    </style>
</head>
<body>

    <div id="hud">Rôle : Assignation...</div>
    <div id="crosshair"></div>

    <div id="overlay">
        <button id="btn-play">DÉMARRER LA PARTIE</button>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>

    <script>
        let socket, scene, camera, renderer, isReady = false;
        let players = {}, playerMeshes = {}, colliders = [];
        const keys = {};
        let prevTime = performance.now();

        document.getElementById('btn-play').addEventListener('click', () => {
            document.getElementById('overlay').style.display = 'none';
            document.body.requestPointerLock();
            isReady = true;
            initGame();
        });

        function initGame() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x87CEEB);
            scene.fog = new THREE.Fog(0x87CEEB, 20, 150);

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 1.6, 20);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;
            document.body.appendChild(renderer.domElement);

            // LUMIÈRES
            scene.add(new THREE.AmbientLight(0xffffff, 0.9));
            const sun = new THREE.DirectionalLight(0xffffff, 0.5);
            sun.position.set(10, 50, 10);
            scene.add(sun);

            // --- SOL (HERBE ET ROUTE) ---
            const world = new THREE.Group();
            const grass = new THREE.Mesh(new THREE.PlaneGeometry(300, 300), new THREE.MeshLambertMaterial({color: 0x567d46}));
            grass.rotation.x = -Math.PI / 2;
            world.add(grass);

            // Route avec lignes blanches
            const road = new THREE.Mesh(new THREE.PlaneGeometry(15, 300), new THREE.MeshLambertMaterial({color: 0x333333}));
            road.rotation.x = -Math.PI / 2;
            road.position.y = 0.02;
            world.add(road);

            const lineGeo = new THREE.PlaneGeometry(0.5, 4);
            const lineMat = new THREE.MeshLambertMaterial({color: 0xffffff});
            for(let i = -30; i < 30; i++) {
                const line = new THREE.Mesh(lineGeo, lineMat);
                line.rotation.x = -Math.PI / 2;
                line.position.set(0, 0.05, i * 8);
                world.add(line);
            }
            scene.add(world);

            // --- FONCTION MAISON DÉTAILLÉE ---
            function createHouse(x, z, color) {
                const house = new THREE.Group();
                
                // Murs
                const body = new THREE.Mesh(new THREE.BoxGeometry(7, 6, 7), new THREE.MeshLambertMaterial({color: 0xffffff}));
                body.position.y = 3;
                house.add(body);

                // Toit
                const roof = new THREE.Mesh(new THREE.ConeGeometry(6, 4, 4), new THREE.MeshLambertMaterial({color: color}));
                roof.position.y = 8;
                roof.rotation.y = Math.PI / 4;
                house.add(roof);

                // Fenêtres (petits cubes noirs)
                const winGeo = new THREE.BoxGeometry(1, 1.2, 0.1);
                const winMat = new THREE.MeshLambertMaterial({color: 0x333333});
                const w1 = new THREE.Mesh(winGeo, winMat); w1.position.set(-1.5, 4, 3.51); house.add(w1);
                const w2 = new THREE.Mesh(winGeo, winMat); w2.position.set(1.5, 4, 3.51); house.add(w2);

                // Porte
                const door = new THREE.Mesh(new THREE.BoxGeometry(1.2, 2.5, 0.1), new THREE.MeshLambertMaterial({color: 0x5d4037}));
                door.position.set(0, 1.25, 3.51);
                house.add(door);

                // Clôture (Barrière)
                const fence = new THREE.Mesh(new THREE.BoxGeometry(10, 1, 10), new THREE.MeshLambertMaterial({color: 0xffffff, wireframe: true}));
                fence.position.y = 0.5;
                house.add(fence);

                house.position.set(x, 0, z);
                scene.add(house);
                colliders.push(new THREE.Box3().setFromObject(body));
            }

            // Génération du quartier
            const colors = [0xff4444, 0x4444ff, 0xffcc00, 0xff8800];
            for(let i = -4; i <= 4; i++) {
                if(i === 0) continue;
                createHouse(-15, i * 20, colors[Math.abs(i)%4]);
                createHouse(15, i * 20, colors[Math.abs(i)%4]);
            }

            // RÉSEAU
            try {
                socket = io("https://murder-mystery-x.onrender.com");
                socket.emit('joinGame', "Joueur-" + Math.floor(Math.random()*99));
                socket.on('currentPlayers', (p) => {
                    players = p;
                    if(players[socket.id]) document.getElementById('hud').innerText = "Rôle : " + players[socket.id].role.toUpperCase();
                });
                socket.on('playerMoved', (p) => {
                    if(p.id !== socket.id && p.alive) {
                        if(!playerMeshes[p.id]) {
                            playerMeshes[p.id] = new THREE.Mesh(new THREE.CapsuleGeometry(0.5, 1.2), new THREE.MeshLambertMaterial({color: 0x0000ff}));
                            scene.add(playerMeshes[p.id]);
                        }
                        playerMeshes[p.id].position.set(p.x, 1.1, p.z);
                    }
                });
            } catch(e) {}

            animate();
        }

        function animate() {
            requestAnimationFrame(animate);
            const time = performance.now();
            const delta = (time - prevTime) / 1000;

            if(isReady && document.pointerLockElement) {
                const oldPos = camera.position.clone();
                const speed = 13 * delta;

                if(keys['KeyW']) camera.translateZ(-speed);
                if(keys['KeyS']) camera.translateZ(speed);
                if(keys['KeyA']) camera.translateX(-speed);
                if(keys['KeyD']) camera.translateX(speed);

                camera.position.y = 1.6;

                const pBox = new THREE.Box3().setFromCenterAndSize(camera.position, new THREE.Vector3(1, 1, 1));
                for(let box of colliders) {
                    if(pBox.intersectsBox(box)) { camera.position.copy(oldPos); break; }
                }

                if(socket) socket.emit('playerMovement', { x: camera.position.x, z: camera.position.z, ry: camera.rotation.y });
            }
            if(renderer) renderer.render(scene, camera);
            prevTime = time;
        }

        document.addEventListener('mousemove', (e) => { if(document.pointerLockElement) camera.rotation.y -= e.movementX * 0.002; });
        window.addEventListener('keydown', (e) => keys[e.code] = true);
        window.addEventListener('keyup', (e) => keys[e.code] = false);
    </script>
</body>
</html>
