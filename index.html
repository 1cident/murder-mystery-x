<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Murder Mystery X - Accès Maison</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: sans-serif; }
        #overlay { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #1a1a1a; z-index: 1000; color: white; }
        #btn-play { padding: 15px 40px; font-size: 18px; cursor: pointer; display: none; background: #ff4757; color: white; border: none; border-radius: 5px; font-weight: bold; }
        #status { margin-top: 10px; color: #888; }
        #crosshair { position: absolute; top: 50%; left: 50%; width: 4px; height: 4px; background: white; border-radius: 50%; transform: translate(-50%, -50%); pointer-events: none; z-index: 10; }
    </style>
</head>
<body>

    <div id="overlay">
        <h1>MURDER MYSTERY X</h1>
        <div id="status">Chargement de la zone...</div>
        <button id="btn-play">ENTRER</button>
    </div>
    <div id="crosshair"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>

    <script>
        let scene, camera, renderer, mapModel, flashlight;
        const keys = {};
        let velocityY = 0;
        let canJump = false;

        // --- RÉGLAGES HAUTEUR ---
        const groundLevel = -12; // On descend encore le sol pour libérer l'entrée
        const playerHeight = 2.0; // Hauteur des yeux du joueur

        const loader = new THREE.GLTFLoader();
        loader.load('./maison.glb', (gltf) => {
            mapModel = gltf.scene;

            // Optimisation et redressement
            mapModel.rotation.set(0, 0, 0);
            const box = new THREE.Box3().setFromObject(mapModel);
            const size = box.getSize(new THREE.Vector3());
            const scale = 110 / Math.max(size.x, size.z);
            mapModel.scale.set(scale, scale, scale);
            
            const center = box.getCenter(new THREE.Vector3());
            // On pose la maison sur le sol rabaissé
            mapModel.position.set(-center.x * scale, groundLevel, -center.z * scale);

            document.getElementById('status').innerText = "✅ Maison prête";
            document.getElementById('btn-play').style.display = "block";
        });

        document.getElementById('btn-play').addEventListener('click', () => {
            document.body.requestPointerLock();
            document.getElementById('overlay').style.display = 'none';
            init();
        });

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x020202);
            scene.fog = new THREE.FogExp2(0x020202, 0.01);

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.rotation.order = 'YXZ';
            
            // --- APPARITION DEVANT LA MAISON ---
            // On te place à 25 unités de distance pour que tu voies la porte direct
            camera.position.set(0, groundLevel + playerHeight, 25); 

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.outputEncoding = THREE.sRGBEncoding;
            document.body.appendChild(renderer.domElement);

            // Lumières (Ambiance + Lampe)
            scene.add(new THREE.AmbientLight(0xffffff, 0.3));
            
            flashlight = new THREE.SpotLight(0xffffff, 2.5, 40, Math.PI/6, 0.5);
            flashlight.visible = true; // Allumée par défaut pour t'aider
            scene.add(flashlight);
            scene.add(flashlight.target);

            if(mapModel) scene.add(mapModel);
            animate();
        }

        window.addEventListener('keydown', (e) => {
            keys[e.code] = true;
            if(e.code === 'KeyF') flashlight.visible = !flashlight.visible;
            if(e.code === 'Space' && canJump) { velocityY = 0.2; canJump = false; }
        });
        window.addEventListener('keyup', (e) => keys[e.code] = false);

        document.addEventListener('mousemove', (e) => {
            if (document.pointerLockElement) {
                camera.rotation.y -= e.movementX * 0.002;
                camera.rotation.x -= e.movementY * 0.002;
                camera.rotation.x = Math.max(-1.5, Math.min(1.5, camera.rotation.x));
                camera.rotation.z = 0;
            }
        });

        function animate() {
            requestAnimationFrame(animate);
            if (document.pointerLockElement) {
                const speed = keys['ShiftLeft'] ? 0.3 : 0.15;
                
                // Mouvements
                if (keys['KeyW']) camera.translateZ(-speed);
                if (keys['KeyS']) camera.translateZ(speed);
                if (keys['KeyA']) camera.translateX(-speed);
                if (keys['KeyD']) camera.translateX(speed);

                // Gravité
                velocityY -= 0.01;
                camera.position.y += velocityY;

                // Limite du sol (Ajustée pour entrer dans la maison)
                if (camera.position.y <= groundLevel + playerHeight) {
                    camera.position.y = groundLevel + playerHeight;
                    velocityY = 0;
                    canJump = true;
                }

                // Lampe de poche
                flashlight.position.copy(camera.position);
                const dir = new THREE.Vector3(0,0,-1).applyQuaternion(camera.quaternion);
                flashlight.target.position.copy(camera.position).add(dir);
            }
            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
