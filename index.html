<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>MMX - Force Render</title>
    <style>
        body { margin: 0; overflow: hidden; background: #87CEEB; font-family: sans-serif; }
        #overlay { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #87CEEB; z-index: 1000; }
        #status { color: white; font-weight: bold; font-size: 20px; text-shadow: 2px 2px black; }
        #btn-play { padding: 15px 40px; font-size: 24px; cursor: pointer; display: none; margin-top: 20px; background: #ff4757; color: white; border: none; border-radius: 10px; }
    </style>
</head>
<body>

    <div id="overlay">
        <div id="status">Chargement...</div>
        <button id="btn-play">JOUER</button>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>

    <script>
        let scene, camera, renderer, model;

        const loader = new THREE.GLTFLoader();
        loader.load('./maison.glb', (gltf) => {
            model = gltf.scene;

            // --- MAGIE : REDIMENSIONNEMENT AUTOMATIQUE ---
            const box = new THREE.Box3().setFromObject(model);
            const size = box.getSize(new THREE.Vector3());
            const maxDim = Math.max(size.x, size.y, size.z);
            const scale = 10 / maxDim; // On force la maison à faire 10 unités de large
            model.scale.set(scale, scale, scale);
            
            // On la centre
            const center = box.getCenter(new THREE.Vector3());
            model.position.x = -center.x * scale;
            model.position.y = -center.y * scale;
            model.position.z = -center.z * scale;
            model.position.y += 5; // On la pose sur le sol

            document.getElementById('status').innerText = "✅ Maison calibrée !";
            document.getElementById('btn-play').style.display = "block";
        }, 
        (xhr) => {
            let p = Math.round((xhr.loaded / xhr.total) * 100);
            document.getElementById('status').innerText = "Téléchargement : " + p + "%";
        },
        (err) => {
            document.getElementById('status').innerText = "❌ Erreur : Fichier introuvable";
        });

        document.getElementById('btn-play').addEventListener('click', () => {
            document.getElementById('overlay').style.display = 'none';
            init();
        });

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x87CEEB);
            
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 10, 25); // On se met à une distance raisonnable

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            scene.add(new THREE.AmbientLight(0xffffff, 2)); // Lumière très forte

            const floor = new THREE.Mesh(
                new THREE.PlaneGeometry(200, 200),
                new THREE.MeshLambertMaterial({ color: 0x7cfc00 })
            );
            floor.rotation.x = -Math.PI / 2;
            scene.add(floor);

            if(model) scene.add(model);
            animate();
        }

        function animate() {
            requestAnimationFrame(animate);
            if(model) model.rotation.y += 0.01;
            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
