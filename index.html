<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>MMX - Ultra Graphics</title>
    <style>
        body { margin: 0; overflow: hidden; background: #87CEEB; font-family: sans-serif; }
        #overlay { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #1a1a1a; z-index: 1000; color: white; }
        #btn-play { padding: 15px 40px; font-size: 20px; cursor: pointer; display: none; background: #ff4757; color: white; border: none; border-radius: 8px; font-weight: bold; }
        #status { margin-top: 15px; color: #aaa; }
    </style>
</head>
<body>

    <div id="overlay">
        <h1 style="letter-spacing: 3px;">MURDER MYSTERY X</h1>
        <div id="status">Chargement des textures HD...</div>
        <button id="btn-play">DÉMARRER LE JEU</button>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>

    <script>
        let scene, camera, renderer, mapModel;
        const keys = {};
        let velocityY = 0;
        const groundLevel = -10;

        const loader = new THREE.GLTFLoader();
        loader.load('./maison.glb', (gltf) => {
            mapModel = gltf.scene;

            // --- AMÉLIORATION DES MATÉRIAUX ---
            mapModel.traverse((node) => {
                if (node.isMesh) {
                    node.castShadow = true;
                    node.receiveShadow = true;
                    // On force le rendu des textures en haute qualité
                    if(node.material.map) node.material.map.anisotropy = 16;
                }
            });

            // Correction rotation si nécessaire
            mapModel.rotation.set(0, 0, 0);

            const box = new THREE.Box3().setFromObject(mapModel);
            const size = box.getSize(new THREE.Vector3());
            const scale = 120 / Math.max(size.x, size.z); 
            mapModel.scale.set(scale, scale, scale);
            
            const center = box.getCenter(new THREE.Vector3());
            mapModel.position.set(-center.x * scale, groundLevel, -center.z * scale);

            document.getElementById('status').innerText = "✅ Optimisation terminée";
            document.getElementById('btn-play').style.display = "block";
        });

        document.getElementById('btn-play').addEventListener('click', () => {
            document.body.requestPointerLock();
            document.getElementById('overlay').style.display = 'none';
            init();
        });

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x87CEEB);

            camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.1, 3000);
            camera.position.set(0, groundLevel + 10, 40);

            // --- CONFIGURATION RENDU HAUTE QUALITÉ ---
            renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance" });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            
            // Ces 3 lignes changent TOUT visuellement :
            renderer.outputEncoding = THREE.sRGBEncoding; 
            renderer.toneMapping = THREE.ReinhardToneMapping;
            renderer.toneMappingExposure = 1.2; 

            document.body.appendChild(renderer.domElement);

            // Lumières réalistes
            const ambient = new THREE.AmbientLight(0xffffff, 0.8); 
            scene.add(ambient);

            const sun = new THREE.DirectionalLight(0xffffff, 1.5);
            sun.position.set(100, 200, 100);
            scene.add(sun);

            // Sol
            const floor = new THREE.Mesh(
                new THREE.PlaneGeometry(2000, 2000),
                new THREE.MeshStandardMaterial({ color: 0x55aa55, roughness: 0.8 })
            );
            floor.rotation.x = -Math.PI / 2;
            floor.position.y = groundLevel;
            scene.add(floor);

            if(mapModel) scene.add(mapModel);
            animate();
        }

        window.addEventListener('keydown', (e) => keys[e.code] = true);
        window.addEventListener('keyup', (e) => keys[e.code] = false);

        document.addEventListener('mousemove', (e) => {
            if (document.pointerLockElement) {
                camera.rotation.y -= e.movementX * 0.002;
                let newX = camera.rotation.x - e.movementY * 0.002;
                camera.rotation.x = Math.max(-1.5, Math.min(1.5, newX));
                camera.rotation.z = 0;
            }
        });

        function animate() {
            requestAnimationFrame(animate);
            if (document.pointerLockElement) {
                const speed = 0.25;
                if (keys['KeyW']) camera.translateZ(-speed);
                if (keys['KeyS']) camera.translateZ(speed);
                if (keys['KeyA']) camera.translateX(-speed);
                if (keys['KeyD']) camera.translateX(speed);

                // Gravité
                if (camera.position.y > groundLevel + 4) {
                    velocityY -= 0.015;
                } else {
                    velocityY = 0;
                    camera.position.y = groundLevel + 4;
                }
                camera.position.y += velocityY;
                camera.rotation.z = 0;
            }
            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
