<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Murder Mystery X - Maison Abandonnée Edition</title>
    <style>
        body { margin: 0; overflow: hidden; background: #87CEEB; font-family: 'Arial Rounded MT Bold', sans-serif; }
        #hud { position: absolute; top: 20px; left: 20px; color: #333; font-size: 22px; font-weight: bold; background: white; padding: 12px 25px; border-radius: 15px; border: 4px solid #000; z-index: 10; display: none; }
        #weapon-slot { position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); width: 100px; height: 100px; background: #222; border: 5px solid #fff; border-radius: 20px; display: none; align-items: center; justify-content: center; font-size: 50px; z-index: 10; }
        #overlay { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #87CEEB; z-index: 1000; }
        #btn-play { padding: 25px 80px; font-size: 40px; font-weight: bold; color: white; background: #ff4757; border: none; border-radius: 60px; cursor: pointer; box-shadow: 0 12px 0 #cc0000; transition: 0.1s; margin-bottom: 20px; }
        #btn-play:active { transform: translateY(6px); box-shadow: 0 6px 0 #cc0000; }
        #loading-text { color: white; font-size: 18px; font-weight: bold; }
    </style>
</head>
<body>

    <div id="hud">Rôle : Assignation...</div>
    <div id="weapon-slot"><span id="weapon-icon">✋</span></div>
    
    <div id="overlay">
        <button id="btn-play">JOUER</button>
        <div id="loading-text">Chargement de la maison abandonnée...</div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>

    <script>
        let socket, scene, camera, renderer, isReady = false;
        let players = {}, playerMeshes = {}, colliders = [];
        let playerModelTemplate = null;
        const keys = {};
        let velocity = new THREE.Vector3(), canJump = false, prevTime = performance.now();

        // --- CHARGEMENT DE TON MODÈLE ---
        const loader = new THREE.GLTFLoader();
        // Utilisation du nom exact avec l'espace encodé (%20)
        const modelURL = './assets/Abandoned%20House.glb'; 

        loader.load(modelURL, (gltf) => {
            playerModelTemplate = gltf.scene;
            // On réduit la taille de la maison pour qu'elle ne soit pas géante sur les joueurs
            playerModelTemplate.scale.set(0.1, 0.1, 0.1); 
            document.getElementById('loading-text').innerText = "Maison prête !";
        }, undefined, (error) => {
            console.error("Erreur de chargement. Vérifie le nom du fichier sur GitHub.");
            document.getElementById('loading-text').innerText = "Erreur : Fichier non trouvé";
        });

        document.getElementById('btn-play').addEventListener('click', () => {
            document.body.requestPointerLock();
            document.getElementById('overlay').style.display = 'none';
            document.getElementById('hud').style.display = 'block';
            document.getElementById('weapon-slot').style.display = 'flex';
            if(!isReady) { initGame(); isReady = true; }
        });

        function createPlayerObject() {
            if (playerModelTemplate) {
                return playerModelTemplate.clone();
            } else {
                // Si le modèle n'est pas chargé, on met un cube rouge par défaut
                return new THREE.Mesh(new THREE.BoxGeometry(1, 1, 1), new THREE.MeshLambertMaterial({color: 0xff0000}));
            }
        }

        function initGame() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x87CEEB);
            scene.fog = new THREE.Fog(0x87CEEB, 10, 150);

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 1.6, 10);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.body.appendChild(renderer.domElement);

            scene.add(new THREE.AmbientLight(0xffffff, 0.8));
            const sun = new THREE.DirectionalLight(0xffffff, 0.6);
            sun.position.set(20, 60, 20);
            scene.add(sun);

            // Sol
            const grass = new THREE.Mesh(new THREE.PlaneGeometry(600, 600), new THREE.MeshLambertMaterial({color: 0x7cfc00}));
            grass.rotation.x = -Math.PI/2; scene.add(grass);

            const road = new THREE.Mesh(new THREE.PlaneGeometry(16, 600), new THREE.MeshLambertMaterial({color: 0x444444}));
            road.rotation.x = -Math.PI/2; road.position.y = 0.01; scene.add(road);

            // RÉSEAU
            socket = io("https://murder-mystery-x.onrender.com");
            socket.on("currentPlayers", (ps) => {
                players = ps;
                const me = players[socket.id];
                if(me) {
                    document.getElementById('hud').innerText = "Rôle : " + me.role.toUpperCase();
                    document.getElementById('weapon-icon').innerText = me.role === 'murderer' ? "🔪" : (me.role === 'sheriff' ? "🔫" : "✋");
                }
            });

            socket.on("playerMoved", (p) => {
                if(p.id === socket.id) return;
                if(!playerMeshes[p.id] && p.alive) {
                    playerMeshes[p.id] = createPlayerObject();
                    scene.add(playerMeshes[p.id]);
                }
                if(playerMeshes[p.id]) {
                    playerMeshes[p.id].position.set(p.x, 0, p.z);
                    playerMeshes[p.id].rotation.y = p.ry || 0;
                }
            });

            animate();
        }

        function animate() {
            requestAnimationFrame(animate);
            const time = performance.now();
            const delta = (time - prevTime) / 1000;

            if(isReady && document.pointerLockElement) {
                const oldPos = camera.position.clone();
                const speed = 15 * delta;
                
                if(keys['KeyW']) camera.translateZ(-speed);
                if(keys['KeyS']) camera.translateZ(speed);
                if(keys['KeyA']) camera.translateX(-speed);
                if(keys['KeyD']) camera.translateX(speed);

                velocity.y -= 35 * delta;
                camera.position.y += velocity.y * delta;
                if(camera.position.y < 1.6) { camera.position.y = 1.6; velocity.y = 0; canJump = true; }
                
                socket.emit('playerMovement', { x: camera.position.x, z: camera.position.z, ry: camera.rotation.y });
            }
            if(renderer) renderer.render(scene, camera);
            prevTime = time;
        }

        window.addEventListener('keydown', (e) => { keys[e.code] = true; if(e.code === 'Space' && canJump) { velocity.y = 13; canJump = false; } });
        window.addEventListener('keyup', (e) => keys[e.code] = false);
        document.addEventListener('mousemove', (e) => { if(document.pointerLockElement) camera.rotation.y -= e.movementX * 0.002; });
        document.addEventListener('mousedown', () => { if(isReady) socket.emit('attack'); });
    </script>
</body>
</html>
