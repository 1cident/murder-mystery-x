<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>MMX - QUARTIER RÉSIDENTIEL</title>
    <style>
        body { margin: 0; overflow: hidden; background: #87CEEB; font-family: 'Segoe UI', sans-serif; }
        #hud { position: absolute; top: 20px; left: 20px; color: #111; font-size: 24px; font-weight: bold; background: rgba(255,255,255,0.7); padding: 10px; border-radius: 8px; z-index: 10; pointer-events: none; }
        #crosshair { position: absolute; top: 50%; left: 50%; width: 14px; height: 14px; border: 2px solid #000; border-radius: 50%; transform: translate(-50%, -50%); z-index: 5; pointer-events: none; }
        #overlay { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; background: #87CEEB; z-index: 100; cursor: pointer; }
        #btn-play { padding: 25px 50px; font-size: 30px; font-weight: bold; color: white; background: #ff4444; border: none; border-radius: 50px; cursor: pointer; box-shadow: 0 10px 0 #cc0000; transition: 0.1s; }
        #btn-play:active { transform: translateY(5px); box-shadow: 0 5px 0 #cc0000; }
    </style>
</head>
<body>

    <div id="hud">Rôle : Assignation...</div>
    <div id="crosshair"></div>

    <div id="overlay">
        <button id="btn-play">ENTRER DANS LE QUARTIER</button>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>

    <script>
        let socket, scene, camera, renderer, isReady = false;
        let players = {}, playerMeshes = {}, colliders = [];
        const keys = {};
        let prevTime = performance.now();

        // 1. DÉMARRAGE
        document.getElementById('btn-play').addEventListener('click', () => {
            document.getElementById('overlay').style.display = 'none';
            document.body.requestPointerLock();
            isReady = true;
            initGame();
        });

        function initGame() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x7ec0ee); // Beau bleu ciel
            scene.fog = new THREE.Fog(0x7ec0ee, 20, 150);

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 1.6, 20);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;
            document.body.appendChild(renderer.domElement);

            // LUMIÈRES
            scene.add(new THREE.AmbientLight(0xffffff, 0.8));
            const sun = new THREE.DirectionalLight(0xffffff, 0.6);
            sun.position.set(50, 100, 50);
            scene.add(sun);

            // --- CRÉATION DU DÉCOR (ROUTE ET HERBE) ---
            const ground = new THREE.Group();
            // Herbe
            const grass = new THREE.Mesh(new THREE.PlaneGeometry(200, 200), new THREE.MeshLambertMaterial({color: 0x7cfc00}));
            grass.rotation.x = -Math.PI / 2;
            ground.add(grass);
            // Route principale
            const road = new THREE.Mesh(new THREE.PlaneGeometry(12, 200), new THREE.MeshLambertMaterial({color: 0x333333}));
            road.rotation.x = -Math.PI / 2;
            road.position.y = 0.05;
            ground.add(road);
            scene.add(ground);

            // --- GÉNÉRATION DES MAISONS ---
            function createHouse(x, z) {
                const house = new THREE.Group();
                // Corps de la maison
                const body = new THREE.Mesh(
                    new THREE.BoxGeometry(6, 5, 6),
                    new THREE.MeshLambertMaterial({color: 0xffffff})
                );
                body.position.y = 2.5;
                house.add(body);

                // Toit (Pyramide)
                const roof = new THREE.Mesh(
                    new THREE.ConeGeometry(5.5, 4, 4),
                    new THREE.MeshLambertMaterial({color: 0xaa2222})
                );
                roof.position.y = 7;
                roof.rotation.y = Math.PI / 4;
                house.add(roof);

                house.position.set(x, 0, z);
                scene.add(house);
                colliders.push(new THREE.Box3().setFromObject(body));
            }

            // Placer des maisons le long de la route
            for(let i = -5; i <= 5; i++) {
                if (i === 0) continue;
                createHouse(-12, i * 20); // Rangée gauche
                createHouse(12, i * 20);  // Rangée droite
            }

            // CONNEXION RÉSEAU
            try {
                socket = io("https://murder-mystery-x.onrender.com");
                socket.emit('joinGame', "Player-" + Math.floor(Math.random()*99));
                socket.on('currentPlayers', (p) => {
                    players = p;
                    if(players[socket.id]) document.getElementById('hud').innerText = "Rôle : " + players[socket.id].role.toUpperCase();
                });
                socket.on('playerMoved', (p) => {
                    if(p.id !== socket.id && p.alive) {
                        if(!playerMeshes[p.id]) {
                            playerMeshes[p.id] = new THREE.Mesh(new THREE.CapsuleGeometry(0.5, 1.2), new THREE.MeshLambertMaterial({color: 0x0000ff}));
                            scene.add(playerMeshes[p.id]);
                        }
                        playerMeshes[p.id].position.set(p.x, 1.1, p.z);
                    }
                });
            } catch(e) {}

            animate();
        }

        function animate() {
            requestAnimationFrame(animate);
            const time = performance.now();
            const delta = (time - prevTime) / 1000;

            if(isReady && document.pointerLockElement) {
                const oldPos = camera.position.clone();
                const speed = 12 * delta;

                if(keys['KeyW']) camera.translateZ(-speed);
                if(keys['KeyS']) camera.translateZ(speed);
                if(keys['KeyA']) camera.translateX(-speed);
                if(keys['KeyD']) camera.translateX(speed);

                camera.position.y = 1.6;

                // Collisions avec les maisons
                const pBox = new THREE.Box3().setFromCenterAndSize(camera.position, new THREE.Vector3(1, 1, 1));
                for(let box of colliders) {
                    if(pBox.intersectsBox(box)) {
                        camera.position.copy(oldPos);
                        break;
                    }
                }

                if(socket) socket.emit('playerMovement', { x: camera.position.x, z: camera.position.z, ry: camera.rotation.y });
            }
            if(renderer) renderer.render(scene, camera);
            prevTime = time;
        }

        document.addEventListener('mousemove', (e) => { if(document.pointerLockElement) camera.rotation.y -= e.movementX * 0.002; });
        window.addEventListener('keydown', (e) => keys[e.code] = true);
        window.addEventListener('keyup', (e) => keys[e.code] = false);
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
