<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>MMX - Gravité Active</title>
    <style>
        body { margin: 0; overflow: hidden; background: #00BFFF; font-family: sans-serif; }
        #overlay { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #00BFFF; z-index: 1000; }
        #status { color: white; font-weight: bold; font-size: 20px; text-shadow: 2px 2px black; }
        #btn-play { padding: 15px 40px; font-size: 24px; cursor: pointer; display: none; margin-top: 20px; background: #ff4757; color: white; border: none; border-radius: 10px; }
        #hud { position: absolute; bottom: 20px; left: 20px; color: white; background: rgba(0,0,0,0.5); padding: 10px; border-radius: 5px; pointer-events: none; }
    </style>
</head>
<body>

    <div id="overlay">
        <div id="status">Chargement de la physique...</div>
        <button id="btn-play">JOUER</button>
    </div>

    <div id="hud">ZQSD : Marcher | ESPACE : Sauter | SOURIS : Regarder</div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>

    <script>
        let scene, camera, renderer, mapModel;
        const keys = {};
        
        // --- VARIABLES PHYSIQUE ---
        let velocityY = 0;
        const gravity = -0.012;
        const jumpStrength = 0.25;
        const playerHeight = 5; // Ta taille sur la maison
        let canJump = false;

        const loader = new THREE.GLTFLoader();
        loader.load('./maison.glb', (gltf) => {
            mapModel = gltf.scene;
            const box = new THREE.Box3().setFromObject(mapModel);
            const size = box.getSize(new THREE.Vector3());
            const scale = 60 / Math.max(size.x, size.z); 
            mapModel.scale.set(scale, scale, scale);
            const center = box.getCenter(new THREE.Vector3());
            mapModel.position.set(-center.x * scale, 0, -center.z * scale);

            document.getElementById('status').innerText = "✅ Physique prête !";
            document.getElementById('btn-play').style.display = "block";
        });

        document.getElementById('btn-play').addEventListener('click', () => {
            document.body.requestPointerLock();
            document.getElementById('overlay').style.display = 'none';
            init();
        });

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x00BFFF);
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, playerHeight, 5); 

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            scene.add(new THREE.AmbientLight(0xffffff, 1));
            if(mapModel) scene.add(mapModel);

            animate();
        }

        window.addEventListener('keydown', (e) => { 
            keys[e.code] = true; 
            // Sauter
            if(e.code === 'Space' && canJump) {
                velocityY = jumpStrength;
                canJump = false;
            }
        });
        window.addEventListener('keyup', (e) => { keys[e.code] = false; });
        document.addEventListener('mousemove', (e) => {
            if (document.pointerLockElement) {
                camera.rotation.y -= e.movementX * 0.002;
            }
        });

        function animate() {
            requestAnimationFrame(animate);
            
            if (document.pointerLockElement) {
                // Déplacement horizontal
                const speed = 0.15;
                if (keys['KeyW']) camera.translateZ(-speed);
                if (keys['KeyS']) camera.translateZ(speed);
                if (keys['KeyA']) camera.translateX(-speed);
                if (keys['KeyD']) camera.translateX(speed);

                // --- LOGIQUE DE GRAVITÉ ---
                velocityY += gravity; // On tire le joueur vers le bas
                camera.position.y += velocityY;

                // Detection du sol (simplifiée à Y = playerHeight)
                if (camera.position.y <= playerHeight) {
                    camera.position.y = playerHeight;
                    velocityY = 0;
                    canJump = true;
                }
            }

            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
