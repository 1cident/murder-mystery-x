<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>MMX - STYLE IMAGE CONCEPT</title>
    <style>
        body { margin: 0; overflow: hidden; background: #87CEEB; font-family: 'Arial', sans-serif; }
        #hud { position: absolute; top: 20px; left: 20px; color: #333; font-size: 20px; font-weight: bold; background: white; padding: 10px 20px; border-radius: 12px; border: 3px solid #000; z-index: 10; }
        #crosshair { position: absolute; top: 50%; left: 50%; width: 20px; height: 20px; border: 2px solid white; border-radius: 50%; transform: translate(-50%, -50%); z-index: 5; mix-blend-mode: difference; }
        #weapon-slot { position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); width: 90px; height: 90px; background: #222; border: 4px solid #fff; border-radius: 15px; display: flex; align-items: center; justify-content: center; font-size: 45px; box-shadow: 0 10px 20px rgba(0,0,0,0.5); }
        #overlay { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; background: #87CEEB; z-index: 100; }
        #btn-play { padding: 20px 60px; font-size: 30px; font-weight: bold; color: white; background: #ff4757; border: none; border-radius: 50px; cursor: pointer; box-shadow: 0 10px 0 #cc0000; }
    </style>
</head>
<body>

    <div id="hud">Rôle : Assignation...</div>
    <div id="crosshair"></div>
    <div id="weapon-slot"><span id="weapon-icon">✋</span></div>
    
    <div id="overlay">
        <button id="btn-play">JOUER</button>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>

    <script>
        let socket, scene, camera, renderer, isReady = false;
        let players = {}, playerMeshes = {}, colliders = [];
        const keys = {};
        let velocity = new THREE.Vector3(), canJump = false, prevTime = performance.now();

        // --- 1. MODÉLISATION DU PERSONNAGE (Le "Bean") ---
        function createCharacterMesh(color) {
            const group = new THREE.Group();
            // Corps
            const body = new THREE.Mesh(new THREE.CapsuleGeometry(0.35, 0.8, 4, 12), new THREE.MeshLambertMaterial({color: color}));
            body.position.y = 0.6;
            group.add(body);
            // Tête
            const head = new THREE.Mesh(new THREE.SphereGeometry(0.32, 16, 16), new THREE.MeshLambertMaterial({color: 0xffdbac}));
            head.position.y = 1.3;
            group.add(head);
            // Yeux
            const eyeGeo = new THREE.SphereGeometry(0.04, 8, 8);
            const eyeMat = new THREE.MeshBasicMaterial({color: 0x000000});
            const eyeL = new THREE.Mesh(eyeGeo, eyeMat); eyeL.position.set(0.12, 1.35, 0.28); group.add(eyeL);
            const eyeR = new THREE.Mesh(eyeGeo, eyeMat); eyeR.position.set(-0.12, 1.35, 0.28); group.add(eyeR);
            return group;
        }

        // --- 2. INITIALISATION ---
        document.getElementById('btn-play').addEventListener('click', () => {
            document.getElementById('overlay').style.display = 'none';
            document.body.requestPointerLock();
            initGame();
            isReady = true;
        });

        function initGame() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x87CEEB);
            scene.fog = new THREE.Fog(0x87CEEB, 20, 120);

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 1.6, 15);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.body.appendChild(renderer.domElement);

            scene.add(new THREE.AmbientLight(0xffffff, 0.8));
            const sun = new THREE.DirectionalLight(0xffffff, 0.6);
            sun.position.set(20, 50, 20);
            scene.add(sun);

            // --- SOL (DÉCOR DE L'IMAGE) ---
            const grass = new THREE.Mesh(new THREE.PlaneGeometry(400, 400), new THREE.MeshLambertMaterial({color: 0x7cfc00}));
            grass.rotation.x = -Math.PI / 2; scene.add(grass);

            const road = new THREE.Mesh(new THREE.PlaneGeometry(14, 400), new THREE.MeshLambertMaterial({color: 0x444444}));
            road.rotation.x = -Math.PI / 2; road.position.y = 0.01; scene.add(road);

            const lineGeo = new THREE.PlaneGeometry(0.6, 4);
            for(let i=-20; i<20; i++) {
                const line = new THREE.Mesh(lineGeo, new THREE.MeshBasicMaterial({color: 0xffffff}));
                line.rotation.x = -Math.PI / 2; line.position.set(0, 0.02, i*10); scene.add(line);
            }

            // Trottoirs
            const curbGeo = new THREE.PlaneGeometry(3, 400);
            const curbMat = new THREE.MeshLambertMaterial({color: 0xaaaaaa});
            const curbL = new THREE.Mesh(curbGeo, curbMat); curbL.rotation.x = -Math.PI/2; curbL.position.set(-8.5, 0.02, 0); scene.add(curbL);
            const curbR = new THREE.Mesh(curbGeo, curbMat); curbR.rotation.x = -Math.PI/2; curbR.position.set(8.5, 0.02, 0); scene.add(curbR);

            // --- MAISONS ET ARBRES ---
            function createBuilding(x, z, roofColor) {
                const house = new THREE.Group();
                const body = new THREE.Mesh(new THREE.BoxGeometry(8, 7, 8), new THREE.MeshLambertMaterial({color: 0xffffff}));
                body.position.y = 3.5; house.add(body);
                const roof = new THREE.Mesh(new THREE.ConeGeometry(7, 5, 4), new THREE.MeshLambertMaterial({color: roofColor}));
                roof.position.y = 9; roof.rotation.y = Math.PI/4; house.add(roof);
                // Fenêtres
                const win = new THREE.Mesh(new THREE.BoxGeometry(2, 2, 0.2), new THREE.MeshBasicMaterial({color: 0x333333}));
                win.position.set(-2, 4.5, 4.01); house.add(win);
                const win2 = win.clone(); win2.position.set(2, 4.5, 4.01); house.add(win2);
                
                house.position.set(x, 0, z); scene.add(house);
                colliders.push(new THREE.Box3().setFromObject(body));

                // Arbre à côté
                const tree = new THREE.Group();
                const trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.3, 0.3, 3), new THREE.MeshLambertMaterial({color: 0x5d4037}));
                trunk.position.y = 1.5; tree.add(trunk);
                const leaves = new THREE.Mesh(new THREE.SphereGeometry(2, 8, 8), new THREE.MeshLambertMaterial({color: 0x228b22}));
                leaves.position.y = 4; tree.add(leaves);
                tree.position.set(x + (x > 0 ? 8 : -8), 0, z + 5);
                scene.add(tree);
            }

            const colors = [0xff4757, 0x2ed573, 0x1e90ff, 0xffa502];
            for(let i=-3; i<=3; i++) {
                if(i !== 0) {
                    createBuilding(-16, i*30, colors[Math.abs(i)%4]);
                    createBuilding(16, i*30, colors[Math.abs(i)%4]);
                }
            }

            // RÉSEAU
            socket = io("https://murder-mystery-x.onrender.com");
            socket.on("connect", () => socket.emit("joinGame", "Joueur"));
            socket.on("currentPlayers", (ps) => {
                players = ps;
                const me = players[socket.id];
                if(me) {
                    document.getElementById('hud').innerText = "Rôle : " + me.role.toUpperCase();
                    document.getElementById('weapon-icon').innerText = me.role === 'murderer' ? "🔪" : (me.role === 'sheriff' ? "🔫" : "✋");
                }
            });
            socket.on("playerMoved", (p) => {
                if(p.id === socket.id) return;
                if(!playerMeshes[p.id] && p.alive) {
                    playerMeshes[p.id] = createCharacterMesh(0x2e86de);
                    scene.add(playerMeshes[p.id]);
                }
                if(playerMeshes[p.id]) {
                    playerMeshes[p.id].position.set(p.x, 0, p.z);
                    playerMeshes[p.id].rotation.y = p.ry || 0;
                }
            });
            socket.on("playerKilled", (id) => { if(playerMeshes[id]) { scene.remove(playerMeshes[id]); delete playerMeshes[id]; }});

            animate();
        }

        function animate() {
            requestAnimationFrame(animate);
            const time = performance.now();
            const delta = (time - prevTime) / 1000;

            if(isReady && document.pointerLockElement) {
                const oldPos = camera.position.clone();
                const speed = 14 * delta;
                if(keys['KeyW']) camera.translateZ(-speed);
                if(keys['KeyS']) camera.translateZ(speed);
                if(
