<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Murder Mystery X - Map & Roles</title>
    <style>
        body { margin: 0; background: #000; color: #d4af37; font-family: sans-serif; overflow: hidden; }
        #hud { position: absolute; top: 10px; left: 10px; z-index: 5; background: rgba(0,0,0,0.5); padding: 10px; border-radius: 5px; }
        canvas { display: block; background: #111; }
        #menu { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; background: rgba(0,0,0,0.9); padding: 50px; border: 2px solid #d4af37; }
        button { padding: 15px 30px; background: none; border: 2px solid #d4af37; color: #d4af37; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<div id="hud">Attente de joueurs (min. 2)...</div>
<div id="menu">
    <h1>MURDER MYSTERY X</h1>
    <button onclick="startGame()">REJOINDRE</button>
</div>
<canvas id="gameCanvas"></canvas>

<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
<script>
    const socket = io("https://murder-mystery-x.onrender.com");
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    
    let players = {};
    let gameActive = false;
    const keys = {};

    // DÉFINITION DE LA MAP (x, y, largeur, hauteur)
    const walls = [
        {x: 200, y: 150, w: 400, h: 40}, // Mur horizontal haut
        {x: 200, y: 400, w: 40, h: 200}, // Mur vertical gauche
        {x: 600, y: 400, w: 40, h: 200}, // Mur vertical droite
        {x: 350, y: 300, w: 100, h: 100} // Bloc central
    ];

    socket.on('currentPlayers', (p) => { players = p; });
    socket.on('gameStarted', (p) => { players = p; document.getElementById('hud').innerText = "PARTIE LANCÉE !"; });
    socket.on('playerMoved', (p) => { players[p.id] = p; });
    socket.on('playerKilled', (id) => { if(players[id]) players[id].alive = false; });

    function startGame() {
        document.getElementById('menu').style.display = 'none';
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        gameActive = true;
        gameLoop();
    }

    window.addEventListener('keydown', e => {
        keys[e.key.toLowerCase()] = true;
        if(e.code === 'Space') socket.emit('attack');
    });
    window.addEventListener('keyup', e => keys[e.key.toLowerCase()] = false);

    function checkCollision(newX, newY) {
        // Collision avec les murs
        for (let wall of walls) {
            if (newX + 15 > wall.x && newX - 15 < wall.x + wall.w &&
                newY + 15 > wall.y && newY - 15 < wall.y + wall.h) {
                return true;
            }
        }
        // Collision bords d'écran
        if (newX < 15 || newX > canvas.width - 15 || newY < 15 || newY > canvas.height - 15) return true;
        return false;
    }

    function update() {
        const me = players[socket.id];
        if (!me || !me.alive) return;

        let oldX = me.x;
        let oldY = me.y;

        if (keys['z']) me.y -= 4;
        if (checkCollision(me.x, me.y)) me.y = oldY;

        if (keys['s']) me.y += 4;
        if (checkCollision(me.x, me.y)) me.y = oldY;

        if (keys['q']) me.x -= 4;
        if (checkCollision(me.x, me.y)) me.x = oldX;

        if (keys['d']) me.x += 4;
        if (checkCollision(me.x, me.y)) me.x = oldX;

        if (oldX !== me.x || oldY !== me.y) {
            socket.emit('playerMovement', { x: me.x, y: me.y });
        }
    }

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // Dessiner les murs
        ctx.fillStyle = "#333";
        walls.forEach(w => {
            ctx.fillRect(w.x, w.y, w.w, w.h);
            ctx.strokeStyle = "#555";
            ctx.strokeRect(w.x, w.y, w.w, w.h);
        });

        // Dessiner les joueurs
        Object.values(players).forEach(p => {
            if (!p.alive) return;
            ctx.fillStyle = (p.id === socket.id && p.role === 'Murderer') ? 'red' : '#d4af37';
            ctx.fillRect(p.x - 15, p.y - 15, 30, 30);
        });

        const me = players[socket.id];
        if (me) document.getElementById('hud').innerText = `RÔLE: ${me.role} | ${me.alive ? 'VIVANT' : 'MORT'}`;
    }

    function gameLoop() {
        if (!gameActive) return;
        update();
        draw();
        requestAnimationFrame(gameLoop);
    }
</script>
</body>
</html>
