<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>MMX - Maison Statique</title>
    <style>
        body { margin: 0; overflow: hidden; background: #00BFFF; font-family: sans-serif; }
        #overlay { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #00BFFF; z-index: 1000; }
        #status { color: white; font-weight: bold; font-size: 20px; text-shadow: 2px 2px black; }
        #btn-play { padding: 15px 40px; font-size: 24px; cursor: pointer; display: none; margin-top: 20px; background: #ff4757; color: white; border: none; border-radius: 10px; box-shadow: 0 5px 0 #b30000; }
    </style>
</head>
<body>

    <div id="overlay">
        <div id="status">Chargement de la zone...</div>
        <button id="btn-play">COMMENCER</button>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>

    <script>
        let scene, camera, renderer, maison;

        const loader = new THREE.GLTFLoader();
        loader.load('./maison.glb', (gltf) => {
            maison = gltf.scene;

            // --- CALIBRAGE TAILLE ---
            const box = new THREE.Box3().setFromObject(maison);
            const size = box.getSize(new THREE.Vector3());
            const maxDim = Math.max(size.x, size.y, size.z);
            const scale = 20 / maxDim; // On la fait assez grande
            maison.scale.set(scale, scale, scale);
            
            // --- POSITIONNEMENT ---
            const center = box.getCenter(new THREE.Vector3());
            maison.position.x = -center.x * scale;
            maison.position.y = -center.y * scale;
            maison.position.z = -center.z * scale;
            maison.position.y += size.y * scale / 2; // Pose la base sur le sol

            document.getElementById('status').innerText = "✅ Prêt !";
            document.getElementById('btn-play').style.display = "block";
        }, 
        (xhr) => {
            let p = Math.round((xhr.loaded / xhr.total) * 100);
            document.getElementById('status').innerText = "Installation : " + p + "%";
        });

        document.getElementById('btn-play').addEventListener('click', () => {
            document.getElementById('overlay').style.display = 'none';
            init();
        });

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x00BFFF); // Ciel bleu vif
            
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            
            // --- POSITION DE DÉPART (SUR LA MAISON) ---
            // On se place un peu en hauteur et au centre
            camera.position.set(0, 12, 15); 
            camera.lookAt(0, 5, 0);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            // Lumières
            scene.add(new THREE.AmbientLight(0xffffff, 1.2));
            const sun = new THREE.DirectionalLight(0xffffff, 1);
            sun.position.set(50, 100, 50);
            scene.add(sun);

            // Sol herbe
            const floor = new THREE.Mesh(
                new THREE.PlaneGeometry(500, 500),
                new THREE.MeshLambertMaterial({ color: 0x2ed573 })
            );
            floor.rotation.x = -Math.PI / 2;
            scene.add(floor);

            if(maison) {
                scene.add(maison);
            }

            animate();
        }

        function animate() {
            requestAnimationFrame(animate);
            // On a supprimé la ligne qui faisait tourner la maison
            renderer.render(scene, camera);
        }

        // Redimensionnement fenêtre
        window.addEventListener('resize', () => {
            if(camera) {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            }
        });
    </script>
</body>
</html>
