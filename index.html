<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Murder Mystery X - Vision Réelle</title>
    <style>
        body { margin: 0; background: #000; color: #d4af37; font-family: sans-serif; overflow: hidden; }
        #hud { position: absolute; top: 10px; left: 10px; z-index: 100; background: rgba(0,0,0,0.7); padding: 10px; border: 1px solid #d4af37; }
        canvas { display: block; }
        #menu { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #000; z-index: 200; }
        button { padding: 15px 40px; background: none; border: 2px solid #d4af37; color: #d4af37; cursor: pointer; font-size: 1.5em; }
    </style>
</head>
<body>

<div id="hud">En attente de joueurs...</div>
<div id="menu">
    <h1 style="font-size: 4em;">MURDER MYSTERY X</h1>
    <button onclick="startGame()">JOUER</button>
</div>
<canvas id="gameCanvas"></canvas>

<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
<script>
    const socket = io("https://murder-mystery-x.onrender.com");
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    
    let players = {};
    let gameActive = false;
    const keys = {};

    const walls = [
        {x: 100, y: 100, w: 200, h: 20},
        {x: 400, y: 0, w: 20, h: 300},
        {x: 100, y: 400, w: 500, h: 20},
        {x: 700, y: 200, w: 20, h: 400}
    ];

    socket.on('currentPlayers', (p) => { players = p; });
    socket.on('gameStarted', (p) => { players = p; });
    socket.on('playerMoved', (p) => { players[p.id] = p; });
    socket.on('playerKilled', (id) => { if(players[id]) players[id].alive = false; });

    function startGame() {
        document.getElementById('menu').style.display = 'none';
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        gameActive = true;
        gameLoop();
    }

    window.addEventListener('keydown', e => keys[e.key.toLowerCase()] = true);
    window.addEventListener('keyup', e => keys[e.key.toLowerCase()] = false);
    
    // Tir du Shérif au clic
    window.addEventListener('mousedown', e => {
        const me = players[socket.id];
        if (me && me.role === 'Sheriff' && me.alive) {
            socket.emit('shoot', {x: e.clientX, y: e.clientY});
        } else if (me && me.role === 'Murderer' && me.alive) {
            socket.emit('attack');
        }
    });

    function checkCollision(x, y) {
        for (let w of walls) {
            if (x+10 > w.x && x-10 < w.x+w.w && y+10 > w.y && y-10 < w.y+w.h) return true;
        }
        return x < 0 || x > canvas.width || y < 0 || y > canvas.height;
    }

    function update() {
        const me = players[socket.id];
        if (!me || !me.alive) return;
        let oldX = me.x, oldY = me.y;
        if (keys['z']) me.y -= 4; if (checkCollision(me.x, me.y)) me.y = oldY;
        if (keys['s']) me.y += 4; if (checkCollision(me.x, me.y)) me.y = oldY;
        if (keys['q']) me.x -= 4; if (checkCollision(me.x, me.y)) me.x = oldX;
        if (keys['d']) me.x += 4; if (checkCollision(me.x, me.y)) me.x = oldX;
        if (oldX !== me.x || oldY !== me.y) socket.emit('playerMovement', {x: me.x, y: me.y});
    }

    function draw() {
        const me = players[socket.id];
        if (!me) return;

        // 1. Dessiner le sol et les murs normalement
        ctx.fillStyle = "#111";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        
        ctx.fillStyle = "#333";
        walls.forEach(w => ctx.fillRect(w.x, w.y, w.w, w.h));

        // 2. Dessiner les joueurs
        Object.values(players).forEach(p => {
            if (!p.alive) return;
            ctx.fillStyle = (p.id === socket.id && p.role === 'Murderer') ? 'red' : (p.id === socket.id && p.role === 'Sheriff' ? 'blue' : '#d4af37');
            ctx.fillRect(p.x - 15, p.y - 15, 30, 30);
        });

        // 3. LE SYSTÈME DE VISION (Lumière autour du joueur)
        if (me.alive) {
            ctx.save();
            ctx.beginPath();
            // On crée un cercle de vision
            ctx.arc(me.x, me.y, 250, 0, Math.PI * 2);
            ctx.rect(canvas.width, 0, -canvas.width, canvas.height); // Inversion pour remplir l'extérieur
            ctx.fillStyle = "rgba(0,0,0,0.98)"; // Noir presque total
            ctx.fill();
            ctx.restore();
        }

        document.getElementById('hud').innerHTML = `RÔLE: ${me.role} | CLIC pour action`;
    }

    function gameLoop() {
        if (!gameActive) return;
        update();
        draw();
        requestAnimationFrame(gameLoop);
    }
</script>
</body>
</html>
