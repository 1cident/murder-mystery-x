<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Murder Mystery X - Fix Final</title>
    <style>
        body { margin: 0; overflow: hidden; background: #87CEEB; font-family: sans-serif; }
        #hud { position: absolute; top: 20px; left: 20px; color: #333; font-size: 20px; font-weight: bold; background: white; padding: 10px; border-radius: 10px; border: 3px solid #000; z-index: 10; display: none; }
        #overlay { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #87CEEB; z-index: 1000; }
        #btn-play { padding: 20px 60px; font-size: 30px; font-weight: bold; color: white; background: #ff4757; border: none; border-radius: 50px; cursor: pointer; box-shadow: 0 8px 0 #cc0000; }
        #status { margin-top: 15px; color: white; font-weight: bold; }
    </style>
</head>
<body>

    <div id="hud">Rôle : Assignation...</div>
    <div id="overlay">
        <button id="btn-play">JOUER</button>
        <div id="status">En attente d'un vrai fichier maison.glb...</div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>

    <script>
        let socket, scene, camera, renderer, isReady = false;
        let playerModelTemplate = null;
        let playerMeshes = {};

        // On cherche le fichier au même endroit que l'index.html
        const modelURL = './maison.glb'; 

        const loader = new THREE.GLTFLoader();
        loader.load(modelURL, (gltf) => {
            playerModelTemplate = gltf.scene;
            playerModelTemplate.scale.set(0.1, 0.1, 0.1); 
            document.getElementById('status').innerText = "Modèle 3D prêt !";
        }, undefined, (err) => {
            document.getElementById('status').innerText = "Erreur : Le fichier maison.glb est vide ou illisible.";
        });

        document.getElementById('btn-play').addEventListener('click', () => {
            document.body.requestPointerLock();
            document.getElementById('overlay').style.display = 'none';
            document.getElementById('hud').style.display = 'block';
            if(!isReady) { initGame(); isReady = true; }
        });

        function initGame() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x87CEEB);
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 5, 15);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            scene.add(new THREE.AmbientLight(0xffffff, 1));
            
            const grass = new THREE.Mesh(new THREE.PlaneGeometry(100, 100), new THREE.MeshLambertMaterial({color: 0x7cfc00}));
            grass.rotation.x = -Math.PI/2;
            scene.add(grass);

            socket = io("https://murder-mystery-x.onrender.com");
            
            socket.on("playerMoved", (p) => {
                if(p.id === socket.id) return;
                if(!playerMeshes[p.id]) {
                    if(playerModelTemplate) {
                        playerMeshes[p.id] = playerModelTemplate.clone();
                    } else {
                        playerMeshes[p.id] = new THREE.Mesh(new THREE.BoxGeometry(1, 1, 1), new THREE.MeshLambertMaterial({color: 0xff0000}));
                    }
                    scene.add(playerMeshes[p.id]);
                }
                playerMeshes[p.id].position.set(p.x, 0, p.z);
            });

            animate();
        }

        function animate() {
            requestAnimationFrame(animate);
            if(renderer) renderer.render(scene, camera);
        }
    </script>
</body>
</html>
