<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Murder Mystery X - Version Finale</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Segoe UI', sans-serif; }
        #overlay { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; background: radial-gradient(circle, #222 0%, #000 100%); z-index: 1000; color: white; }
        #loader-container { width: 250px; height: 6px; background: #333; border-radius: 3px; margin: 20px; overflow: hidden; }
        #loader-bar { width: 0%; height: 100%; background: #ff4757; transition: width 0.2s; }
        #btn-play { padding: 15px 40px; font-size: 18px; cursor: pointer; display: none; background: #ff4757; color: white; border: none; border-radius: 5px; font-weight: bold; text-transform: uppercase; letter-spacing: 2px; }
        #crosshair { position: absolute; top: 50%; left: 50%; width: 6px; height: 6px; background: rgba(255,255,255,0.8); border-radius: 50%; transform: translate(-50%, -50%); pointer-events: none; z-index: 10; border: 1px solid rgba(0,0,0,0.5); }
        #ui { position: absolute; bottom: 20px; left: 20px; color: white; text-shadow: 2px 2px 4px #000; pointer-events: none; }
    </style>
</head>
<body>

    <div id="overlay">
        <h1 style="margin-bottom: 0;">MURDER MYSTERY X</h1>
        <p style="opacity: 0.6; font-size: 14px;">Maison Abandonnée - 22.4 Mo</p>
        <div id="loader-container"><div id="loader-bar"></div></div>
        <p id="status">Chargement des textures...</p>
        <button id="btn-play">DÉMARRER LA PARTIE</button>
    </div>

    <div id="crosshair"></div>
    <div id="ui">
        <b>[Z,Q,S,D]</b> Marcher | <b>[MAJ]</b> Courir<br>
        <b>[F]</b> Lampe de poche | <b>[ESPACE]</b> Sauter
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>

    <script>
        let scene, camera, renderer, mapModel, flashlight;
        let isFlashlightOn = false;
        const keys = {};
        
        // Physique & Collisions
        let velocityY = 0;
        let canJump = false;
        const playerHeight = 3.5;
        const groundLevel = -10;
        const raycaster = new THREE.Raycaster(); // Pour détecter les murs

        // 1. CHARGEMENT HAUTE QUALITÉ
        const loader = new THREE.GLTFLoader();
        loader.load('./maison.glb', (gltf) => {
            mapModel = gltf.scene;
            
            mapModel.traverse(node => {
                if (node.isMesh) {
                    node.material.side = THREE.DoubleSide;
                    node.material.roughness = 0.7;
                }
            });

            // Ajustement automatique
            const box = new THREE.Box3().setFromObject(mapModel);
            const size = box.getSize(new THREE.Vector3());
            const scale = 110 / Math.max(size.x, size.z);
            mapModel.scale.set(scale, scale, scale);
            const center = box.getCenter(new THREE.Vector3());
            mapModel.position.set(-center.x * scale, groundLevel, -center.z * scale);

            document.getElementById('status').innerText = "✅ Système prêt";
            document.getElementById('btn-play').style.display = "block";
        }, (xhr) => {
            const p = Math.round((xhr.loaded / xhr.total) * 100);
            document.getElementById('loader-bar').style.width = p + "%";
        });

        document.getElementById('btn-play').addEventListener('click', () => {
            document.body.requestPointerLock();
            document.getElementById('overlay').style.display = 'none';
            init();
        });

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x050505); // Nuit noire
            scene.fog = new THREE.FogExp2(0x050505, 0.015);

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.rotation.order = 'YXZ';

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.outputEncoding = THREE.sRGBEncoding;
            document.body.appendChild(renderer.domElement);

            // LUMIÈRES
            scene.add(new THREE.AmbientLight(0xffffff, 0.2)); // Ambiance très sombre

            // Lampe de poche HD
            flashlight = new THREE.SpotLight(0xfff5d7, 2.5, 50, Math.PI/6, 0.5, 1);
            flashlight.position.set(0, 0, 0);
            scene.add(flashlight);
            scene.add(flashlight.target);

            if(mapModel) scene.add(mapModel);
            
            animate();
        }

        // CONTRÔLES
        window.addEventListener('keydown', (e) => {
            keys[e.code] = true;
            if(e.code === 'KeyF') {
                isFlashlightOn = !isFlashlightOn;
                flashlight.visible = isFlashlightOn;
            }
            if(e.code === 'Space' && canJump) {
                velocityY = 0.22;
                canJump = false;
            }
        });
        window.addEventListener('keyup', (e) => keys[e.code] = false);

        document.addEventListener('mousemove', (e) => {
            if (document.pointerLockElement) {
                camera.rotation.y -= e.movementX * 0.002;
                camera.rotation.x -= e.movementY * 0.002;
                camera.rotation.x = Math.max(-Math.PI/2.1, Math.min(Math.PI/2.1, camera.rotation.x));
                camera.rotation.z = 0;
            }
        });

        function animate() {
            requestAnimationFrame(animate);
            if (document.pointerLockElement) {
                
                // --- SYSTÈME DE COLLISION & MOUVEMENT ---
                const speed = keys['ShiftLeft'] ? 0.35 : 0.18; // Sprint
                let oldPos = camera.position.clone();

                if (keys['KeyW']) camera.translateZ(-speed);
                if (keys['KeyS']) camera.translateZ(speed);
                if (keys['KeyA']) camera.translateX(-speed);
                if (keys['KeyD']) camera.translateX(speed);

                // Détection de mur simple (Raycast vers l'avant)
                const direction = new THREE.Vector3(0,0,-1).applyQuaternion(camera.quaternion);
                raycaster.set(camera.position, direction);
                const intersects = raycaster.intersectObject(mapModel, true);
                
                if (intersects.length > 0 && intersects[0].distance < 1.5) {
                    camera.position.copy(oldPos); // Bloque le mouvement si trop proche d'un mur
                }

                // Gravité
                velocityY -= 0.01;
                camera.position.y += velocityY;

                if (camera.position.y <= groundLevel + playerHeight) {
                    camera.position.y = groundLevel + playerHeight;
                    velocityY = 0;
                    canJump = true;
                }

                // Lampe de poche suit la vue
                flashlight.position.copy(camera.position);
                const targetPos = new THREE.Vector3(0,0,-1).applyQuaternion(camera.quaternion).add(camera.position);
                flashlight.target.position.copy(targetPos);
            }
            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
