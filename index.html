<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Murder Mystery X</title>
    <style>
        body { margin: 0; background: #000; color: #d4af37; font-family: sans-serif; overflow: hidden; display: flex; justify-content: center; align-items: center; height: 100vh; }
        #game-ui { position: absolute; text-align: center; z-index: 10; background: rgba(0,0,0,0.8); padding: 20px; border: 2px solid #d4af37; }
        canvas { display: none; background: #050505; cursor: crosshair; }
        #hud { position: absolute; top: 10px; left: 10px; color: white; font-weight: bold; pointer-events: none; }
    </style>
</head>
<body>

<div id="hud"></div>
<div id="game-ui">
    <h1>MURDER MYSTERY X</h1>
    <button onclick="startGame()" style="padding: 10px 20px; cursor: pointer;">JOUER</button>
</div>

<canvas id="gameCanvas"></canvas>

<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>

<script>
    // --- REMPLACE PAR TON URL RENDER ---
    const socket = io("https://murder-mystery-x.onrender.com");
    
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    let players = {};
    let gameRunning = false;
    const keys = {};

    socket.on('currentPlayers', (p) => { players = p; });
    socket.on('newPlayer', (p) => { players[p.id] = p; });
    socket.on('playerMoved', (p) => { players[p.id] = p; });
    socket.on('playerKilled', (id) => { if(players[id]) players[id].alive = false; });
    socket.on('playerDisconnected', (id) => { delete players[id]; });

    function startGame() {
        document.getElementById('game-ui').style.display = 'none';
        canvas.style.display = 'block';
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        gameRunning = true;
        requestAnimationFrame(gameLoop);
    }

    window.addEventListener('keydown', e => {
        keys[e.key.toLowerCase()] = true;
        if(e.code === 'Space') socket.emit('attack');
    });
    window.addEventListener('keyup', e => keys[e.key.toLowerCase()] = false);

    function gameLoop() {
        if (!gameRunning) return;
        
        // Update local
        const me = players[socket.id];
        if (me && me.alive) {
            let moved = false;
            if (keys['z']) { me.y -= 5; moved = true; }
            if (keys['s']) { me.y += 5; moved = true; }
            if (keys['q']) { me.x -= 5; moved = true; }
            if (keys['d']) { me.x += 5; moved = true; }
            if (moved) socket.emit('playerMovement', { x: me.x, y: me.y });
        }

        // Draw
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        document.getElementById('hud').innerText = me ? `RÔLE: ${me.role} | ${me.alive ? 'VIVANT' : 'MORT'}` : "";

        Object.values(players).forEach(p => {
            if (!p.alive) return;
            ctx.fillStyle = (p.id === socket.id && p.role === 'Murderer') ? 'red' : '#d4af37';
            ctx.fillRect(p.x - 15, p.y - 15, 30, 30);
        });

        requestAnimationFrame(gameLoop);
    }
</script>
</body>
</html>
