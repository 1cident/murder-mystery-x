<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Murder Mystery X - Fix Visuel</title>
    <style>
        body { margin: 0; overflow: hidden; background: #87CEEB; font-family: sans-serif; }
        #overlay { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #87CEEB; z-index: 1000; }
        #status { color: white; font-weight: bold; font-size: 20px; text-shadow: 2px 2px black; }
        #btn-play { padding: 15px 40px; font-size: 24px; cursor: pointer; display: none; margin-top: 20px; background: #ff4757; color: white; border: none; border-radius: 10px; }
    </style>
</head>
<body>

    <div id="overlay">
        <div id="status">Chargement de la maison (22 Mo)...</div>
        <button id="btn-play">JOUER</button>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>

    <script>
        let scene, camera, renderer, model;

        // 1. CHARGEMENT
        const loader = new THREE.GLTFLoader();
        loader.load('./maison.glb', (gltf) => {
            model = gltf.scene;
            
            // On centre le modèle pour éviter qu'il soit n'importe où
            const box = new THREE.Box3().setFromObject(model);
            const center = box.getCenter(new THREE.Vector3());
            model.position.sub(center); 
            
            document.getElementById('status').innerText = "✅ Maison prête !";
            document.getElementById('btn-play').style.display = "block";
        }, 
        (xhr) => {
            let p = Math.round((xhr.loaded / xhr.total) * 100);
            document.getElementById('status').innerText = "Téléchargement : " + p + "%";
        },
        (err) => {
            document.getElementById('status').innerText = "❌ Erreur de fichier";
        });

        document.getElementById('btn-play').addEventListener('click', () => {
            document.getElementById('overlay').style.display = 'none';
            init();
        });

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x87CEEB);
            
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 5000);
            // On se met très loin pour être sûr de voir la maison (qui fait 22Mo)
            camera.position.set(0, 50, 150); 

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            // Lumières puissantes
            scene.add(new THREE.AmbientLight(0xffffff, 1.5));
            const sun = new THREE.DirectionalLight(0xffffff, 1);
            sun.position.set(100, 200, 100);
            scene.add(sun);

            // Un sol très grand
            const floor = new THREE.Mesh(
                new THREE.PlaneGeometry(2000, 2000),
                new THREE.MeshLambertMaterial({ color: 0x7cfc00 })
            );
            floor.rotation.x = -Math.PI / 2;
            scene.add(floor);

            if(model) {
                scene.add(model);
                camera.lookAt(model.position); // La caméra fixe la maison !
            }

            animate();
        }

        function animate() {
            requestAnimationFrame(animate);
            if(model) model.rotation.y += 0.005; // La maison tourne pour qu'on la repère
            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
