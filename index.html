<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Murder Mystery X - Officiel</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        
        /* Ecran de chargement */
        #overlay {
            position: absolute; inset: 0; z-index: 1000;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            background: radial-gradient(circle, #1a1a1a 0%, #000 100%); color: white;
        }

        #loader-bar-container { width: 250px; height: 8px; background: #333; border-radius: 4px; margin: 20px; overflow: hidden; }
        #loader-bar { width: 0%; height: 100%; background: #ff4757; transition: width 0.3s; }

        #btn-play {
            padding: 15px 50px; font-size: 20px; font-weight: bold; color: white;
            background: #ff4757; border: none; border-radius: 5px; cursor: pointer;
            display: none; box-shadow: 0 4px 15px rgba(255, 71, 87, 0.4);
        }

        /* Interface en jeu */
        #crosshair { 
            position: absolute; top: 50%; left: 50%; width: 6px; height: 6px; 
            background: white; border-radius: 50%; transform: translate(-50%, -50%); 
            border: 1px solid black; pointer-events: none; z-index: 10;
        }
        
        #hud {
            position: absolute; bottom: 20px; left: 20px; color: white;
            pointer-events: none; text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
            font-size: 14px; line-height: 1.5;
        }
    </style>
</head>
<body>

    <div id="overlay">
        <h1 style="letter-spacing: 5px;">MURDER MYSTERY X</h1>
        <div id="loader-bar-container"><div id="loader-bar"></div></div>
        <div id="status">Chargement de la maison...</div>
        <button id="btn-play">JOUER</button>
    </div>

    <div id="crosshair"></div>
    <div id="hud">
        <b>[Z,Q,S,D]</b> Marcher | <b>[MAJ]</b> Courir<br>
        <b>[F]</b> Lampe Torche | <b>[ESPACE]</b> Sauter
    </div>
