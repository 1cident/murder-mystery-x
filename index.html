<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Murder Mystery X - Test 3D</title>
    <style>
        body { margin: 0; overflow: hidden; background: #87CEEB; font-family: sans-serif; }
        #overlay { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #87CEEB; z-index: 1000; }
        #status { color: white; font-weight: bold; font-size: 20px; text-shadow: 2px 2px black; }
        #btn-play { padding: 15px 40px; font-size: 24px; cursor: pointer; display: none; margin-top: 20px; }
    </style>
</head>
<body>

    <div id="overlay">
        <div id="status">Chargement du fichier maison.glb (22 Mo)...</div>
        <button id="btn-play">JOUER</button>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>

    <script>
        let scene, camera, renderer, myHouse;

        // 1. CHARGEMENT DU MODÈLE
        const loader = new THREE.GLTFLoader();
        loader.load('./maison.glb', (gltf) => {
            myHouse = gltf.scene;
            
            // --- RÉGLAGE DE LA TAILLE ---
            // Si tu ne vois rien, on va essayer de changer 0.1 par 1 ou 0.01
            myHouse.scale.set(0.1, 0.1, 0.1); 
            
            // On place la maison juste devant le départ
            myHouse.position.set(0, 0, -10); 
            
            document.getElementById('status').innerText = "✅ Maison chargée !";
            document.getElementById('btn-play').style.display = "block";
        }, 
        (xhr) => {
            let p = Math.round((xhr.loaded / xhr.total) * 100);
            document.getElementById('status').innerText = "Téléchargement : " + p + "%";
        },
        (err) => {
            document.getElementById('status').innerText = "❌ Erreur : Fichier introuvable ou corrompu.";
        });

        document.getElementById('btn-play').addEventListener('click', () => {
            document.getElementById('overlay').style.display = 'none';
            init();
        });

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x87CEEB);
            
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 5, 15); // On recule pour bien voir la maison
            camera.lookAt(0, 0, 0);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            // Lumière forte pour bien voir le modèle
            scene.add(new THREE.AmbientLight(0xffffff, 1.5));
            const sun = new THREE.DirectionalLight(0xffffff, 1);
            sun.position.set(5, 10, 7);
            scene.add(sun);

            // Sol
            const floor = new THREE.Mesh(
                new THREE.PlaneGeometry(200, 200),
                new THREE.MeshLambertMaterial({ color: 0x7cfc00 })
            );
            floor.rotation.x = -Math.PI / 2;
            scene.add(floor);

            // On ajoute la maison à la scène
            if(myHouse) scene.add(myHouse);

            animate();
        }

        function animate() {
            requestAnimationFrame(animate);
            if(myHouse) {
                // On fait tourner la maison doucement pour vérifier qu'elle est là
                myHouse.rotation.y += 0.01;
            }
            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
