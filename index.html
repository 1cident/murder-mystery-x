<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>MMX - PERSONNAGES</title>
    <style>
        body { margin: 0; overflow: hidden; background: #87CEEB; font-family: 'Segoe UI', sans-serif; }
        #hud { position: absolute; top: 20px; left: 20px; color: #111; font-size: 20px; font-weight: bold; background: rgba(255,255,255,0.8); padding: 10px; border-radius: 8px; z-index: 10; pointer-events: none; border: 2px solid #333; }
        #crosshair { position: absolute; top: 50%; left: 50%; width: 14px; height: 14px; border: 2px solid #000; border-radius: 50%; transform: translate(-50%, -50%); z-index: 5; pointer-events: none; }
        #weapon-slot { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); width: 80px; height: 80px; background: rgba(0,0,0,0.6); border: 3px solid #fff; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 40px; z-index: 10; }
        #spectator-ui { position: absolute; top: 15%; width: 100%; text-align: center; color: white; font-size: 32px; font-weight: bold; text-shadow: 2px 2px 8px #000; display: none; pointer-events: none; z-index: 11; }
        #overlay { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; background: #87CEEB; z-index: 100; }
        #btn-play { padding: 25px 50px; font-size: 28px; font-weight: bold; color: white; background: #2ecc71; border: none; border-radius: 50px; cursor: pointer; box-shadow: 0 8px 0 #27ae60; }
        #btn-play:active { transform: translateY(4px); box-shadow: 0 4px 0 #27ae60; }
    </style>
</head>
<body>

    <div id="hud">Rôle : En attente...</div>
    <div id="spectator-ui">👻 MODE SPECTATEUR</div>
    <div id="crosshair"></div>
    <div id="weapon-slot"><span id="weapon-icon">✋</span></div>
    
    <div id="overlay">
        <button id="btn-play">REJOINDRE LA PARTIE</button>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>

    <script>
        let socket, scene, camera, renderer, isReady = false;
        let players = {}, playerMeshes = {}, houseBoxes = [];
        const keys = {};
        let velocity = new THREE.Vector3(), canJump = false, isSpectator = false, prevTime = performance.now();

        // --- 1. LOGIQUE MULTIJOUEUR ---
        function initMultiplayer() {
            socket = io("https://murder-mystery-x.onrender.com", {
                transports: ["websocket", "polling"],
                reconnection: true,
                reconnectionAttempts: 5
            });

            socket.on("connect", () => {
                console.log("Connecté ! ID:", socket.id);
                socket.emit("joinGame", "Joueur_" + Math.floor(Math.random() * 999));
            });

            socket.on("currentPlayers", (serverPlayers) => {
                players = serverPlayers;
                Object.keys(playerMeshes).forEach(id => {
                    if (!players[id]) { scene.remove(playerMeshes[id]); delete playerMeshes[id]; }
                });
                updateHUD();
            });

            socket.on("playerMoved", (p) => {
                if (p.id === socket.id) return;
                if (!playerMeshes[p.id] && p.alive) {
                    playerMeshes[p.id] = createPlayerMesh(0x4444ff); // Joueur BLEU par défaut
                    scene.add(playerMeshes[p.id]);
                }
                if (playerMeshes[p.id]) {
                    playerMeshes[p.id].position.set(p.x, 1.1, p.z);
                    playerMeshes[p.id].rotation.y = p.ry || 0;
                }
            });

            socket.on("playerKilled", (id) => {
                if (id === socket.id) {
                    isSpectator = true;
                    document.getElementById('spectator-ui').style.display = 'block';
                    document.getElementById('weapon-slot').style.display = 'none';
                    document.getElementById('hud').innerText = "Rôle : SPECTATEUR";
                }
                if (playerMeshes[id]) { scene.remove(playerMeshes[id]); delete playerMeshes[id]; }
            });
        }

        function updateHUD() {
            const me = players[socket.id];
            if (me) {
                document.getElementById('hud').innerText = "Rôle : " + me.role.toUpperCase();
                const icon = document.getElementById('weapon-icon');
                if (me.role === 'murderer') icon.innerText = "🔪";
                else if (me.role === 'sheriff') icon.innerText = "🔫";
                else icon.innerText = "✋";
            }
        }
        
        // --- 2. MODÈLE DU JOUEUR ---
        function createPlayerMesh(color) {
            const playerGroup = new THREE.Group();

            // Corps (Capsule)
            const body = new THREE.Mesh(
                new THREE.CapsuleGeometry(0.4, 1.0, 4, 8),
                new THREE.MeshLambertMaterial({ color: color })
            );
            body.position.y = 0.5; // Base du corps au sol
            playerGroup.add(body);

            // Tête (Sphère)
            const head = new THREE.Mesh(
                new THREE.SphereGeometry(0.35, 16, 16),
                new THREE.MeshLambertMaterial({ color: 0xffe0bd }) // Couleur peau
            );
            head.position.y = 1.3; // Au-dessus du corps
            playerGroup.add(head);

            // Pour que le group soit manipulable depuis l'extérieur
            return playerGroup;
        }

        // --- 3. INITIALISATION JEU & BOUTON ---
        document.getElementById('btn-play').addEventListener('click', () => {
            document.getElementById('overlay').style.display = 'none';
            // Le requestPointerLock doit être dans l'action utilisateur directe
            document.body.requestPointerLock(); 
            initScene();
            initMultiplayer();
            isReady = true;
        });

        function initScene() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x87CEEB);
            scene.fog = new THREE.Fog(0x87CEEB, 10, 150);

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 1.6, 20); // Position initiale

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.body.appendChild(renderer.domElement);

            scene.add(new THREE.AmbientLight(0xffffff, 0.8));
            const sun = new THREE.DirectionalLight(0xffffff, 0.5);
            sun.position.set(10, 50, 10);
            scene.add(sun);

            // Sol & Routes
            const grass = new THREE.Mesh(new THREE.PlaneGeometry(300, 300), new THREE.MeshLambertMaterial({ color: 0x567d46 }));
            grass.rotation.x = -Math.PI / 2; scene.add(grass);

            const road = new THREE.Mesh(new THREE.PlaneGeometry(16, 300), new THREE.MeshLambertMaterial({ color: 0x333333 }));
            road.rotation.x = -Math.PI / 2; road.position.y = 0.01; scene.add(road);

            // Création Maisons
            for (let i = -3; i <= 3; i++) {
                if (i !== 0) {
                    const house = new THREE.Group();
                    const body = new THREE.Mesh(new THREE.BoxGeometry(8, 7, 8), new THREE.MeshLambertMaterial({ color: 0xffffff }));
                    body.position.y = 3.5; house.add(body);
                    const roof = new THREE.Mesh(new THREE.ConeGeometry(7, 5, 4), new THREE.MeshLambertMaterial({ color: 0xaa2222 }));
                    roof.position.y = 9; roof.rotation.y = Math.PI / 4; house.add(roof);
                    house.position.set(i < 0 ? -18 : 18, 0, i * 25);
                    scene.add(house);
                    houseBoxes.push(new THREE.Box3().setFromObject(body));
                }
            }
            animate();
        }

        // --- 4. BOUCLE DE JEU ---
        function animate() {
            requestAnimationFrame(animate);
            const time = performance.now();
            const delta = (time - prevTime) / 1000;

            if (isReady && document.pointerLockElement) {
                const speed = isSpectator ? 30 : 13;
                const oldPos = camera.position.clone();

                if (keys['KeyW']) camera.translateZ(-speed * delta);
                if (keys['KeyS']) camera.translateZ(speed * delta);
                if (keys['KeyA']) camera.translateX(-speed * delta);
                if (keys['KeyD']) camera.translateX(speed * delta);

                if (!isSpectator) {
                    // Gravité & Saut
                    velocity.y -= 32.0 * delta;
                    camera.position.y += velocity.y * delta;
                    if (camera.position.y < 1.6) { velocity.y = 0; camera.position.y = 1.6; canJump = true; }

                    // Collisions
                    const pBox = new THREE.Box3().setFromCenterAndSize(camera.position, new THREE.Vector3(1.6, 2, 1.6));
                    for (let box of houseBoxes) {
                        if (pBox.intersectsBox(box)) { camera.position.copy(oldPos); break; }
                    }

                    // Envoi position
                    if (socket && socket.connected) {
                        socket.emit('playerMovement', { x: camera.position.x, z: camera.position.z, ry: camera.rotation.y });
                    }
                } else {
                    // Vol Spectateur
                    if (keys['Space']) camera.position.y += speed * delta;
                    if (keys['ShiftLeft']) camera.position.y -= speed * delta;
                }
            }
            if (renderer) renderer.render(scene, camera);
            prevTime = time;
        }

        // --- 5. ÉCOUTEURS D'ÉVÉNEMENTS ---
        window.addEventListener('keydown', (e) => {
            keys[e.code] = true;
            if (e.code === 'Space' && canJump && !isSpectator) { velocity.y += 12.5; canJump = false; }
        });
        window.addEventListener('keyup', (e) => keys[e.code] = false);
        document.addEventListener('mousemove', (e) => { if (document.pointerLockElement) camera.rotation.y -= e.movementX * 0.002; });
        document.addEventListener('mousedown', (e) => { if (isReady && socket && !isSpectator && e.button === 0) socket.emit('attack'); });
    </script>
</body>
</html>
